<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أنت غير متصل بالإنترنت | دليل العرب في تركيا</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 420px;
      width: 100%;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #10b981;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    button {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    button:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      يبدو أن اتصالك بالإنترنت منقطع حالياً.<br />
      تحقق من اتصالك وحاول مجدداً.
    </p>
    <button onclick="window.location.reload()">
      إعادة المحاولة
    </button>
  </div>
</body>
</html>
